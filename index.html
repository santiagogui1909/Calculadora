<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Calculadora.css">
    <link rel="stylesheet" href="css/fontello.css">
    <title>calculadora s.g</title>
    <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2014/10/16/09/15/lens-490806_960_720.jpg" type="image/x-icon">

<body>
    <header class="title">
        <h1>calculator</h1>
    </header>

    <main class="calculator">
        <div class="box-exit">
            <input id="result" type="text" class="display" placeholder="0">
        </div>
        <section class="keys">
            <button class="delete" name="deleteAll">ac</button>
            <button class="operator" name="operator">%</button>
            <button class="operator" name="operator">*</button> <br>
            <button class="number" name="numbers">7</button>
            <button class="number" name="numbers">8</button>
            <button class="number" name="numbers">9</button>
            <button class="operator" name="operator">/</button> <br>
            <button class="number" name="numbers">4</button>
            <button class="number" name="numbers">5</button>
            <button class="number" name="numbers">6</button>
            <button class="operator" name="operator">-</button> <br>
            <button class="number" name="numbers">1</button>
            <button class="number" name="numbers">2</button>
            <button class="number" name="numbers">3</button>
            <button class="operator" name="operator">+</button> <br>
            <button class="number" name="numbers">0</button>
            <button class="number" name="numbers">.</button>
            <button class="equal" name="equal">=</button>
        </section>
    </main>
    <footer id="contact">
        <section class="contFooter">
            <article class="contact">
                <div>
                    <h3>phone</h3>
                    <p><span class="icon-whatsapp"></span>3138409535</p>
                </div>
                <div>
                    <h3>email</h3>
                    <p><span class="icon-gmail"></span> santiagogui1909@gmail.com</p>
                </div>
            </article>
            <article class="contact">
                <div>
                    <h3>github</h3>
                    <a href="https://github.com/santiagogui1909" target="_blank"><span
                            class="icon-github-circled"></span>look at my repository</a>
                </div>
                <div>
                    <h3>linkedin</h3>
                    <a href="https://www.linkedin.com/in/santiago-guillen-ramirez-b162211a7" target="_blank"><span
                            class="icon-linkedin"></span>look my linkedin profile</a>
                </div>
                <div>
                    <h3>instagram</h3>
                    <a href="https://www.instagram.com/santiagogr19/" target="_blank"><span class="icon-instagram"></span>follow me on instagram</a>
                </div>
            </article>
        </section>
        <p class=Copyright>
            Copyright &copy; Santiago Guillen
        </p>
    </footer>
</body>

</html>
